services:
  campfire:
    image: xw134/campfire
    container_name: campfire
    ports:
      - "3030:80"
    volumes:
      - /path/to/config/dir:/var/www/html/data
    restart: unless-stopped
    networks:
      - campfire_network
    environment:
      - NODE_ENV=production
      - USER_UID=1000
      - USER_GID=1000

networks:
  campfire_network:
    driver: bridge
